<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Logs · Noctis</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/tradelogs.css">
</head>
<body>
    <!-- Sidebar: same block, "Trade Logs" is active -->
    <div class="sidenav">
        <h1 class="logo">Noctis</h1>
        <p class="tagline">Your friendly<br>trading bot</p>

        <div class="status-list">
            <p class="status"><span class="dot good"></span>Bot Status</p>
            <p class="status"><span class="dot good"></span>Server Status</p>
            <p class="status"><span class="dot good"></span>Web Host Status</p>
        </div>

        <nav class="nav-buttons">
            <a href="index.html" class="nav-button">Account Overview</a>
            <a href="dashboard.html" class="nav-button">Dashboard</a>
            <a href="tradelogs.html" class="nav-button active">Trade Logs</a>
            <a href="expenses.html" class="nav-button">Expenses</a>
        </nav>
    </div>

    <main class="main">
        <h2 class="page-title">Trade Logs</h2>
        <p class="page-subtitle">Most recent 50 entries from tradelogs.txt</p>

        <div class="logs-toolbar">
            <span class="logs-count" id="logs-count">Loading…</span>
            <button class="refresh-btn" id="refresh-btn">Refresh</button>
        </div>

        <div class="table-wrap">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th class="col-time" data-sort="time">Timestamp <span class="arrow">↓</span></th>
                        <th class="col-level" data-sort="level">Level <span class="arrow"></span></th>
                        <th class="col-message" data-sort="message">Message <span class="arrow"></span></th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <tr><td colspan="3" class="logs-empty">Loading logs…</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/tradelogs.js"></script>
</body>
</html>
